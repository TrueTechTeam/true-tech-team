[build]
  functions = "netlify/functions"

  # Skip build if no relevant files changed
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- libs/hotmess-api/netlify/ package.json package-lock.json libs/hotmess-api/netlify.toml"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/auth/sports-engine/token"
  to = "/.netlify/functions/sports-engine-token"
  status = 200

[[redirects]]
  from = "/api/auth/sports-engine/refresh"
  to = "/.netlify/functions/sports-engine-refresh"
  status = 200
