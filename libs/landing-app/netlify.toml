# Netlify configuration for True Tech Team landing app
# Using Next.js runtime for server-side features (authentication, API routes)
# Package directory set to libs/landing-app in Netlify UI (build still runs from repo root)

[build]
  command = "npx nx build landing-app"
  publish = "libs/landing-app/.next"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- libs/landing-app/ libs/ui-components/src/ package.json package-lock.json tsconfig.base.json"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/storybook/*"
  to = "https://truetechteamcomponents.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/storybook"
  to = "https://truetechteamcomponents.netlify.app/"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
