# Netlify configuration for hotmess-web (React SPA)

[build]
  command = "npx nx build hotmess-web --configuration=production"
  publish = "dist/libs/hotmess-web"

[build.environment]
  NODE_VERSION = "22"
  # VITE_SUPABASE_* are intentionally bundled into the client-side JS by Vite (public anon key by design)
  # .nx/cache and dist contain build artifacts that will always include these values
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_SUPABASE_URL"
  SECRETS_SCAN_OMIT_PATHS = ".nx/cache,dist"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Immutable cache for hashed static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
